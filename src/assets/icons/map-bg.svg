<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 800" preserveAspectRatio="xMidYMid slice">
  <rect width="1600" height="800" fill="#e8edf2"/>

  <!-- Парки/зелёные зоны -->
  <path d="M0 0 L380 0 L420 80 L360 180 L240 220 L180 320 L0 280 Z" fill="#d6e4d4" opacity="0.7"/>
  <path d="M1200 600 L1600 580 L1600 800 L1180 800 Z" fill="#d6e4d4" opacity="0.7"/>
  <circle cx="900" cy="200" r="80" fill="#d6e4d4" opacity="0.6"/>
  <ellipse cx="1300" cy="150" rx="120" ry="70" fill="#d6e4d4" opacity="0.6"/>

  <!-- Реки/каналы -->
  <path d="M0 500 Q 400 480 800 520 T 1600 500" stroke="#b8d4e8" stroke-width="14" fill="none" opacity="0.7"/>

  <!-- Главные дороги (горизонтальные) -->
  <line x1="0" y1="150" x2="1600" y2="160" stroke="#ffffff" stroke-width="10"/>
  <line x1="0" y1="380" x2="1600" y2="400" stroke="#ffffff" stroke-width="12"/>
  <line x1="0" y1="620" x2="1600" y2="640" stroke="#ffffff" stroke-width="10"/>

  <!-- Главные дороги (вертикальные) -->
  <line x1="280" y1="0" x2="290" y2="800" stroke="#ffffff" stroke-width="10"/>
  <line x1="700" y1="0" x2="720" y2="800" stroke="#ffffff" stroke-width="12"/>
  <line x1="1080" y1="0" x2="1100" y2="800" stroke="#ffffff" stroke-width="10"/>
  <line x1="1400" y1="0" x2="1410" y2="800" stroke="#ffffff" stroke-width="8"/>

  <!-- Второстепенные улицы (тонкие) -->
  <g stroke="#ffffff" stroke-width="4" opacity="0.85">
    <line x1="0" y1="60" x2="1600" y2="70"/>
    <line x1="0" y1="240" x2="1600" y2="260"/>
    <line x1="0" y1="310" x2="1600" y2="320"/>
    <line x1="0" y1="460" x2="1600" y2="470"/>
    <line x1="0" y1="540" x2="1600" y2="550"/>
    <line x1="0" y1="700" x2="1600" y2="710"/>
    <line x1="0" y1="760" x2="1600" y2="770"/>

    <line x1="80" y1="0" x2="90" y2="800"/>
    <line x1="160" y1="0" x2="170" y2="800"/>
    <line x1="380" y1="0" x2="390" y2="800"/>
    <line x1="460" y1="0" x2="470" y2="800"/>
    <line x1="540" y1="0" x2="550" y2="800"/>
    <line x1="620" y1="0" x2="630" y2="800"/>
    <line x1="800" y1="0" x2="810" y2="800"/>
    <line x1="880" y1="0" x2="890" y2="800"/>
    <line x1="960" y1="0" x2="970" y2="800"/>
    <line x1="1180" y1="0" x2="1190" y2="800"/>
    <line x1="1260" y1="0" x2="1270" y2="800"/>
    <line x1="1500" y1="0" x2="1510" y2="800"/>
  </g>

  <!-- Кварталы (светлые прямоугольники с лёгкой обводкой) -->
  <g fill="#f4f6f8" stroke="#dde3ea" stroke-width="1" opacity="0.6">
    <rect x="100" y="80" width="60" height="60"/>
    <rect x="180" y="80" width="80" height="60"/>
    <rect x="300" y="170" width="70" height="60"/>
    <rect x="480" y="170" width="50" height="60"/>
    <rect x="820" y="170" width="60" height="60"/>
    <rect x="900" y="80" width="60" height="60"/>
    <rect x="980" y="170" width="80" height="60"/>
    <rect x="1200" y="170" width="60" height="60"/>
    <rect x="100" y="260" width="70" height="50"/>
    <rect x="300" y="260" width="80" height="50"/>
    <rect x="480" y="330" width="60" height="50"/>
    <rect x="820" y="330" width="60" height="50"/>
    <rect x="980" y="260" width="80" height="50"/>
    <rect x="1200" y="260" width="60" height="50"/>
    <rect x="100" y="410" width="60" height="50"/>
    <rect x="300" y="410" width="80" height="50"/>
    <rect x="980" y="410" width="60" height="50"/>
    <rect x="1200" y="410" width="80" height="50"/>
    <rect x="100" y="650" width="60" height="50"/>
    <rect x="300" y="650" width="80" height="50"/>
    <rect x="480" y="650" width="60" height="50"/>
    <rect x="820" y="650" width="60" height="50"/>
    <rect x="980" y="650" width="80" height="50"/>
  </g>
